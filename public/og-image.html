<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.card{text-align:center}
.brand{font-size:48px;font-weight:800;color:#fff;letter-spacing:2px}
.sub{font-size:20px;color:rgba(255,255,255,0.6);margin-top:8px;letter-spacing:4px}
.time{font-family:'Courier New',monospace;font-size:120px;font-weight:700;color:#e0e0e0;margin:40px 0 20px;letter-spacing:8px}
.bar{width:300px;height:6px;background:#3b82f6;border-radius:3px;margin:0 auto}
.features{display:flex;gap:24px;margin-top:32px;justify-content:center}
.feat{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 24px;color:#aaa;font-size:16px;font-weight:600}
</style>
</head>
<body>
<div class="card">
<div class="brand">Euna Flow</div>
<div class="sub">집중의 시간</div>
<div class="time">05:00</div>
<div class="bar"></div>
<div class="features">
<div class="feat">⏱ 타이머</div>
<div class="feat">🏁 스톱워치</div>
<div class="feat">⏰ 자명종</div>
<div class="feat">🕐 시계</div>
</div>
</div>
</body>
</html>
